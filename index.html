<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>数学探索中心 · 知识宝典</title>
<link rel="stylesheet" href="css/style.css?v=4">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#302b63">
<meta name="description" content="小学数学、初中数学、中考数学知识点全收录 - 2835条知识">
</head>
<body>
<div class="header">
  <div class="dec"><span></span><span></span><span></span><span></span><span></span><span></span></div>
  <button class="theme-btn" id="themeBtn" onclick="toggleTheme()" title="切换主题">🌙</button>
  <div class="hc">
    <h1>🧮 数学探索中心</h1>
    <div class="subtitle">小学 · 初中 · 中考</div>
    <div class="sb">
      <span class="ic">🔍</span>
      <input type="text" id="sq" placeholder="搜索知识点..." autocomplete="off" spellcheck="false">
      <span class="hk">⌘/</span>
    </div>
  </div>
</div>

<div id="loadingScreen" class="loading">
  <div class="spinner"></div>
  <h3>加载知识库中...</h3>
  <p style="font-size:13px;color:var(--text-muted);margin-top:8px">2835 条知识，马上就好</p>
</div>

<div class="hm" id="hm" style="display:none"></div>
<div class="qs" id="qs" style="display:none"></div>

<div class="br" id="br">
  <div class="tb">
    <span class="bh" onclick="goHome()">← 返回首页</span>
    <div class="bh-group">
      <span class="bh bh-sm" onclick="randomKnowledge()" title="随机知识点">🎲 随机</span>
      <span class="bh bh-sm" onclick="showFavorites()" title="收藏夹">⭐ 收藏</span>
      <span class="bh bh-sm" onclick="showLearningProgress()" title="学习进度">📖 进度</span>
      <span class="bh bh-sm" onclick="showGraph()" title="知识图谱">📊 图谱</span>
    </div>
  </div>
  <div class="mt" id="mt"></div>
  <div class="mw">
    <span class="tg-btn" id="tg">☰ 分类筛选</span>
    <div class="sd" id="sd"></div>
    <div class="ct">
      <!-- Favorites & Progress panels (shown when toggled) -->
      <div id="extraPanels"></div>
      <div class="cr">
        <div class="info" id="st">共 <strong>0</strong> 条知识</div>
      </div>
      <div id="cps" class="cps"></div>
      <div class="ac" id="ac"></div>
      <div class="cb" id="cb"></div>
      <div id="rs"></div>
    </div>
  </div>
</div>

<!-- ===== TEXTBOOK VIEW ===== -->
<div class="tbv" id="tbv" style="display:none">
  <div class="tb">
    <span class="bh" onclick="goHomeFromTB()">← 返回首页</span>
    <div class="bh-group">
      <span class="bh bh-sm" id="tbvTitle" style="font-weight:700;font-size:15px">📘 教材库</span>
    </div>
  </div>
  <div class="tbv-body" id="tbvBody">
    <div class="tbv-col tbv-col-left" id="tbvColLeft">
      <div class="tbv-col-header">📚 教材版本</div>
      <div class="tbv-sel-bar" id="tbvSelBar" onclick="showBookPicker()">
        <span id="tbvSelLabel">点击选择教材 ▾</span>
      </div>
    </div>
    <div class="tbv-col tbv-col-mid" id="tbvColMid" style="display:none">
      <div class="tbv-col-header">📖 章节</div>
      <div id="tbvChapterList"></div>
    </div>
    <div class="tbv-col tbv-col-right" id="tbvColRight">
      <div class="tbv-col-header">📄 小节</div>
      <div class="tbv-section-list" id="tbvSectionList"></div>
    </div>
  </div>
  <!-- Comparison section -->
  <div class="tbv-compare" id="tbvCompare">
    <div class="tbv-compare-left">
      <div class="tbv-compare-btn" id="tbvCompareBtn" onclick="toggleCompare()">📊 教材对比</div>
    </div>
    <div class="tbv-compare-body" id="tbvCompareBody" style="display:none">
      <div class="tbv-compare-tabs">
        <span class="tbv-compare-tab on" id="ctabOver" onclick="switchCompareMode('over')">📌 超纲对比</span>
        <span class="tbv-compare-tab" id="ctabLearned" onclick="switchCompareMode('learned')">✅ 已学检测</span>
      </div>
      <!-- Over-standard mode -->
      <div id="cmpOver">
        <div class="tbv-compare-row">
          <div class="tbv-compare-pick" onclick="pickComparePrimary()">
            <span id="tbvCpLabel">点击选择主教材</span>
          </div>
          <span class="tbv-compare-vs">VS</span>
          <div class="tbv-compare-pick" onclick="pickCompareTarget()">
            <span id="tbvCtLabel">+ 添加对比教材</span>
          </div>
        </div>
        <div class="tbv-compare-tags" id="tbvCompareTargets"></div>
        <div class="tbv-compare-results" id="tbvCompareResults"><div class="tbv-cr-empty">请选择主教材和对比教材</div></div>
      </div>
      <!-- Learned-check mode -->
      <div id="cmpLearned" style="display:none">
        <div class="tbv-compare-row">
          <div class="tbv-compare-pick" onclick="pickLearnedPrimary()">
            <span id="tbvLpLabel">点击选择主教材</span>
          </div>
          <span class="tbv-compare-vs">已学教材</span>
          <div class="tbv-compare-pick" onclick="pickLearnedTarget()">
            <span id="tbvLtLabel">+ 添加已学教材</span>
          </div>
        </div>
        <div class="tbv-compare-tags" id="tbvLearnedTags"></div>
        <div class="tbv-compare-results" id="tbvLearnedResults"><div class="tbv-cr-empty">请选择主教材和至少一本已学教材</div></div>
      </div>
    </div>
  </div>
</div>

<!-- Textbook picker modal -->
<div class="tbv-picker-overlay" id="tbvPicker" style="display:none" onclick="hideBookPicker(event)">
  <div class="tbv-picker-modal" onclick="event.stopPropagation()">
    <div class="tbv-picker-header">📚 选择教材版本 <span class="tbv-picker-close" onclick="hideBookPicker()">✕</span></div>
    <div class="tbv-picker-grid" id="tbvPickerGrid"></div>
  </div>
</div>

<div class="mmodal" id="mv"><span class="mclose" onclick="hideImg()">×</span></div>

<!-- Auth overlay -->
<div id="authOverlay" class="auth-overlay" style="display:none">
  <div class="auth-modal">
    <div class="auth-left">
      <h2>🔐 授权访问</h2>
      <p>内容已锁定，请输入访问密码</p>
      <div class="al">访问密码</div>
      <input type="password" id="authPwd" placeholder="请输入密码..." onkeydown="if(event.key==='Enter')checkAuth()">
      <button class="ab" onclick="checkAuth()">🔓 验证身份</button>
      <div class="ae" id="authErr">❌ 密码错误，请重试</div>
    </div>
    <div class="auth-right">
      <div style="width:180px;height:180px;background:linear-gradient(135deg,#6366f1,#a855f7);border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:60px;box-shadow:0 4px 20px rgba(0,0,0,0.1)">🧮</div>
      <div class="qr-t">数学探索中心<br><strong>学无止境</strong></div>
    </div>
  </div>
</div>

<script>
const STORE_KEY = 'math_explorer';

// State
let D = [];
let S = {};
let T = {};
let C = {};
let Q = [];
let meta = {};
let TB = [];
let st = {m:'',c1:'',c2:'',tp:'all',q:'',ar:''};
let isDataLoaded = false;
let preferDark = window.matchMedia('(prefers-color-scheme: dark)').matches;

// ===== DATA LOADING =====
async function loadData() {
  try {
    const [entries, summary, cats, regions, quotes, metadata, textbooks] = await Promise.all([
      fetch('data/entries.json').then(r=>r.json()),
      fetch('data/summary.json').then(r=>r.json()),
      fetch('data/categories.json').then(r=>r.json()),
      fetch('data/regions.json').then(r=>r.json()),
      fetch('data/quotes.json').then(r=>r.json()),
      fetch('data/meta.json').then(r=>r.json()),
      fetch('data/textbooks.json?v=4').then(r=>r.json()),
    ]);
    D = entries;
    S = summary;
    T = cats;
    C = regions;
    Q = quotes;
    meta = metadata;
    TB = textbooks || [];
    isDataLoaded = true;
    document.getElementById('loadingScreen').style.display = 'none';
    document.getElementById('hm').style.display = 'grid';
    document.getElementById('qs').style.display = 'block';
    init();
  } catch(e) {
    document.getElementById('loadingScreen').innerHTML = 
      '<div class="em"><div class="e">❌</div><h3>加载失败：'+e.message+'</h3><p style="color:var(--text-muted);margin-top:8px">请检查网络后刷新页面</p></div>';
  }
}

// ===== INIT =====
function init() {
  restoreTheme();
  renderHome();
  renderQuote();
  setupSearch();
  setupSidebarToggle();
  setupKeyboard();
  loadUserData();
  // If returning to browse mode, restore
  if (st.m) {
    document.getElementById('hm').style.display = 'none';
    document.getElementById('qs').style.display = 'none';
    document.getElementById('br').classList.add('sh');
    renderModuleTabs();
    renderSidebar();
    renderResults();
  }
}

// ===== THEME =====
function toggleTheme() {
  const html = document.documentElement;
  const btn = document.getElementById('themeBtn');
  if (html.getAttribute('data-theme') === 'dark') {
    html.removeAttribute('data-theme');
    btn.textContent = '🌙';
    localStorage.setItem( STORE_KEY + '_theme', 'light');
  } else {
    html.setAttribute('data-theme', 'dark');
    btn.textContent = '☀️';
    localStorage.setItem( STORE_KEY + '_theme', 'dark');
  }
}
function restoreTheme() {
  const saved = localStorage.getItem( STORE_KEY + '_theme');
  const btn = document.getElementById('themeBtn');
  if (saved === 'dark' || (!saved && preferDark)) {
    document.documentElement.setAttribute('data-theme', 'dark');
    btn.textContent = '☀️';
  } else {
    btn.textContent = '🌙';
  }
}

// ===== HOME =====
function renderHome() {
  const el = document.getElementById('hm');
  let h = '';
  h += `<div class="cd m4" onclick="enterTextbook()">
    <div class="dv"></div>
    <div class="top"><div class="ico">📚</div>
    <div><div class="nm">教材库</div><div class="ct">${TB.length} 本教材 · 共 ${TB.reduce((s,b)=>s+b.chapters.length,0)} 章</div></div></div>
    <div class="desc">按教材目录组织章节，逐节学习知识内容</div>
    <div class="cs">
      <span class="tg">📘 ${TB.length} 套教材已收录</span>
      <span class="tg">📋 ${TB.reduce((s,b)=>s+b.chapters.length,0)} 章 · ${TB.reduce((s,b)=>s+b.chapters.reduce((s2,c)=>s2+c.sections.length,0),0)} 节</span>
      <span class="tg">🔄 持续更新中</span>
    </div></div>`;
  for (const k of ['小学','初中','中考']) {
    const mk = {'小学':'小学','初中':'初中','中考':'中考数学'}[k];
    const s = S[mk] || {n:0, cs:{}};
    const icons = {'小学':'🎒','初中':'📐','中考数学':'🎯'};
    const descs = {'小学':'从加减乘除到几何图形，打下坚实的数学基础','初中':'代数方程与几何证明，构建系统的数学思维','中考数学':'把握考情趋势，直击中考热点与难点'};
    const cats = Object.entries(s.cs).sort((a,b) => b[1]-a[1]).slice(0,16);
    const chips = cats.map(x => `<span class="tg">${esc(x[0])} <span class="nu">${x[1]}</span></span>`).join('');
    const cls = {'小学':'m1','初中':'m2','中考数学':'m3'}[mk];
    h += `<div class="cd ${cls}" onclick="enterModule('${k}')">
      <div class="dv"></div>
      <div class="top"><div class="ico">${icons[mk]||'💭'}</div>
      <div><div class="nm">${k}</div><div class="ct">${s.n} 条知识</div></div></div>
      <div class="desc">${descs[mk]||''}</div>
      <div class="cs">${chips}</div></div>`;
  }
  el.innerHTML = h;
}

function renderQuote() {
  const el = document.getElementById('qs');
  if (!el || !Q.length) return;
  const q = Q[Math.floor(Math.random() * Q.length)];
  el.innerHTML = `<div class="qc"><div class="qt"><span class="star">★</span> ${esc(q[0])} <span class="star">★</span></div><div class="qa">${esc(q[1])||''}</div></div>`;
}

// ===== NAVIGATION =====
function enterModule(m) {
  if (!requireAuth()) return;
  st = {m:{'小学':'小学','初中':'初中','中考':'中考数学'}[m],c1:'',c2:'',tp:'all',q:'',ar:''};
  document.getElementById('sq').value = '';
  document.getElementById('hm').style.display = 'none';
  document.getElementById('qs').style.display = 'none';
  document.getElementById('br').classList.add('sh');
  renderModuleTabs();
  renderSidebar();
  renderResults();
}

function goHome() {
  st = {m:'',c1:'',c2:'',tp:'all',q:'',ar:''};
  document.getElementById('hm').style.display = 'grid';
  document.getElementById('qs').style.display = 'block';
  document.getElementById('br').classList.remove('sh');
  document.getElementById('tbv').style.display = 'none';
  document.getElementById('extraPanels').innerHTML = '';
  renderHome();
  renderQuote();
}

// ===== TEXTBOOK VIEW =====
let currentTB = null;
let currentChapter = null;
function enterTextbook() {
  if (!requireAuth()) return;
  document.getElementById('hm').style.display = 'none';
  document.getElementById('qs').style.display = 'none';
  document.getElementById('br').classList.remove('sh');
  document.getElementById('tbv').style.display = 'block';
  currentTB = null;
  currentChapter = null;
  comparePrimary = null;
  compareTargets = [];
  learnedPrimary = null;
  learnedTargets = [];
  document.getElementById('tbvCompareBody').style.display = 'none';
  compareOpen = false;
  renderTextbookView();
}

function goHomeFromTB() {
  currentTB = null;
  currentChapter = null;
  comparePrimary = null;
  compareTargets = [];
  learnedPrimary = null;
  learnedTargets = [];
  goHome();
}

// === Book picker modal ===
function showBookPicker() {
  const grid = document.getElementById('tbvPickerGrid');
  let h = renderGroupedBookList('pickTextbook');
  grid.innerHTML = h;
  document.getElementById('tbvPicker').style.display = 'flex';
}

function renderGroupedBookList(callback) {
  const groups = {};
  const gradeOrder = {'六年级上册':1,'六年级下册':2,'七年级上册':3,'七年级下册':4,'八年级上册':5,'八年级下册':6,'九年级上册':7,'九年级下册':8};
  for (const book of TB) {
    const pub = book.publisher;
    if (!groups[pub]) groups[pub] = [];
    groups[pub].push(book);
  }
  // Sort books within each publisher by grade
  for (const pub in groups) {
    groups[pub].sort((a, b) => (gradeOrder[a.grade]||99) - (gradeOrder[b.grade]||99));
  }
  const pubOrder = ['苏科版','冀教版','人教版','北师大版','北京版','沪教版五四制'];
  
  let h = '';
  for (const pub of pubOrder) {
    if (!groups[pub] || groups[pub].length === 0) continue;
    const pubColors = {'苏科版':'#0ea5e9','冀教版':'#e11d48','人教版':'#16a34a','北师大版':'#d97706','北京版':'#7c3aed','沪教版五四制':'#d97706'};
    const col = pubColors[pub] || '#6366f1';
    // Publisher section header (collapsible)
    h += `<div class="tbv-pub-header" onclick="togglePubGroup(this)" style="cursor:pointer;padding:8px 12px;margin-top:6px;border-radius:8px;background:${col}15;display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:${col}">
      <span style="font-size:10px">▼</span> ${pub} <span style="font-size:10px;opacity:.6">${groups[pub].length}本</span>
    </div>`;
    h += `<div class="tbv-pub-group">`;
    for (const book of groups[pub]) {
      const bg = book.iconBg || '#6366f1';
      h += `<div class="tbv-picker-row" onclick="${callback}('${escQ(book.id)}')">
        <span class="tbv-pc-icon" style="background:${bg}">${book.iconText||'📘'}</span>
        <span class="tbv-pc-name">${esc(book.grade)}</span>
      </div>`;
    }
    h += `</div>`;
  }
  return h;
}

function togglePubGroup(el) {
  const group = el.nextElementSibling;
  const arrow = el.querySelector('span:first-child');
  if (group.style.display === 'none') {
    group.style.display = 'grid';
    arrow.textContent = '▼';
  } else {
    group.style.display = 'none';
    arrow.textContent = '▶';
  }
}

function hideBookPicker(e) {
  if (e && e.target !== e.currentTarget) return;
  document.getElementById('tbvPicker').style.display = 'none';
}

function pickTextbook(id) {
  const book = TB.find(b => b.id === id);
  if (!book) return;
  currentTB = book;
  currentChapter = null;
  document.getElementById('tbvPicker').style.display = 'none';
  document.getElementById('tbvSelBar').innerHTML = `<span class="tbv-sel-badge" style="background:${book.iconBg||'#6366f1'}">${book.iconText||'📘'}</span><span class="tbv-sel-name">${esc(book.grade)}</span><span class="tbv-sel-arrow">▾</span>`;
  document.getElementById('tbvColMid').style.display = 'block';
  document.getElementById('tbvSectionList').innerHTML = '';
  renderChapterList();
}

function renderTextbookView() {
  document.getElementById('tbvSelBar').innerHTML = '<span id="tbvSelLabel" style="color:var(--accent);font-weight:600;font-size:14px">点击选择教材 ▾</span>';
  document.getElementById('tbvColMid').style.display = 'none';
  document.getElementById('tbvSectionList').innerHTML = '';
}

// === Chapter/Section rendering ===
function renderChapterList() {
  const chList = document.getElementById('tbvChapterList');
  if (!currentTB) { chList.innerHTML = ''; return; }
  let h = '';
  for (let i = 0; i < currentTB.chapters.length; i++) {
    const ch = currentTB.chapters[i];
    const active = currentChapter && currentChapter.num === ch.num ? 'on' : '';
    h += `<div class="tbv-chapter-item ${active}" onclick="selectChapter(${i})">
      <span class="tbv-ch-num">第${ch.num}章</span>
      <span class="tbv-ch-name">${esc(ch.name)}</span>
      <span class="tbv-ch-cnt">${ch.sections.length} 节</span>
    </div>`;
  }
  chList.innerHTML = h;
}

function selectChapter(idx) {
  if (!currentTB || idx < 0 || idx >= currentTB.chapters.length) return;
  currentChapter = currentTB.chapters[idx];
  document.querySelectorAll('#tbvChapterList .tbv-chapter-item').forEach(el => el.classList.remove('on'));
  const items = document.querySelectorAll('#tbvChapterList .tbv-chapter-item');
  if (items[idx]) items[idx].classList.add('on');
  renderSections();
}

function renderSections() {
  const list = document.getElementById('tbvSectionList');
  if (!currentChapter) { list.innerHTML = ''; return; }
  document.getElementById('tbvTitle').textContent = `${currentTB.iconText||'📘'} ${currentTB.label} · 第${currentChapter.num}章 ${currentChapter.name}`;
  let h = '';
  for (const sec of currentChapter.sections) {
    h += `<div class="tbv-section-row">
      <span class="tbv-sr-num">${esc(sec.num)}</span>
      <span class="tbv-sr-name">${esc(sec.name)}</span>
    </div>`;
  }
  list.innerHTML = h;
}

// === Comparison feature ===
let compareMode = 'over'; // 'over' or 'learned'
let comparePrimary = null;
let compareTarget = null;
let compareOpen = false;

// Learned-check mode
let learnedPrimary = null;
let learnedTargets = []; // array of textbook objects

function toggleCompare() {
  compareOpen = !compareOpen;
  document.getElementById('tbvCompareBody').style.display = compareOpen ? 'block' : 'none';
}

function switchCompareMode(mode) {
  compareMode = mode;
  document.getElementById('ctabOver').className = 'tbv-compare-tab' + (mode==='over'?' on':'');
  document.getElementById('ctabLearned').className = 'tbv-compare-tab' + (mode==='learned'?' on':'');
  document.getElementById('cmpOver').style.display = mode==='over'?'block':'none';
  document.getElementById('cmpLearned').style.display = mode==='learned'?'block':'none';
}

// === Over-standard comparison ===
function pickComparePrimary() {
  compareMode = 'over';
  document.getElementById('tbvPicker').onclick = function(e) {
    if (e.target === this) hideBookPicker(e);
  };
  const grid = document.getElementById('tbvPickerGrid');
  let h = '';
  for (const book of TB) {
    const bg = book.iconBg || '#6366f1';
    h += `<div class="tbv-picker-card" onclick="pickComparePrimaryBook('${escQ(book.id)}')">
      <div class="tbv-pc-icon" style="background:${bg}">${book.iconText||'📘'}</div>
      <div class="tbv-pc-name">${esc(book.label)}</div>
    </div>`;
  }
  grid.innerHTML = h;
  document.getElementById('tbvPicker').style.display = 'flex';
}

function pickComparePrimaryBook(id) {
  const book = TB.find(b => b.id === id);
  if (!book) return;
  document.getElementById('tbvPicker').style.display = 'none';
  comparePrimary = book;
  const bg = book.iconBg||'#6366f1';
  document.getElementById('tbvCpLabel').innerHTML = `<span class="tbv-sel-badge" style="background:${bg}">${book.iconText||'📘'}</span> ${esc(book.label)}`;
  if (comparePrimary && compareTargets.length > 0) runOverComparison();
}

function pickCompareTarget() {
  compareMode = 'over';
  document.getElementById('tbvPicker').onclick = function(e) {
    if (e.target === this) hideBookPicker(e);
  };
  refreshCompareTargetPicker();
  document.getElementById('tbvPicker').style.display = 'flex';
}

function refreshCompareTargetPicker() {
  const grid = document.getElementById('tbvPickerGrid');
  let h = '<div style="grid-column:1/-1;text-align:right;font-size:11px;color:var(--text-muted);padding:4px 0">可连续选择多个，选完点击背景关闭</div>';
  for (const book of TB) {
    if (learnedPrimary && book.id === learnedPrimary.id) continue;
    if (compareTargets.some(t => t.id === book.id)) continue;
    if (comparePrimary && book.id === comparePrimary.id) continue;
    const bg = book.iconBg || '#6366f1';
    h += `<div class="tbv-picker-card" onclick="event.stopPropagation();pickCompareTargetBook('${escQ(book.id)}')">
      <div class="tbv-pc-icon" style="background:${bg}">${book.iconText||'📘'}</div>
      <div class="tbv-pc-name">${esc(book.label)}</div>
    </div>`;
  }

function pickCompareTargetBook(id) {

function removeCompareTarget(id) {

function renderCompareTargetTags() {
  const container = document.getElementById('tbvCompareTargets');

      <span class="tbv-learned-remove" onclick="removeCompareTarget('${escQ(book.id)}')">✕</span>
    </span>`;

function runOverComparison() {
  const results = document.getElementById('tbvCompareResults');
  if (!comparePrimary || compareTargets.length === 0) return;
  
  const learnedSects = new Set();
  const learnedChaps = new Set();
  for (const ch of comparePrimary.chapters) {
    learnedChaps.add(ch.name);
    for (const sec of ch.sections) learnedSects.add(sec.name);
  }
  
  const gradeOrder = {'六年级上册':1,'六年级下册':2,'七年级上册':3,'七年级下册':4,'八年级上册':5,'八年级下册':6,'九年级上册':7,'九年级下册':8};
  const pGrade = gradeOrder[comparePrimary.grade] || 3;
  for (const book of TB) {
    if (book.publisher === comparePrimary.publisher && book.id !== comparePrimary.id) {
      const bGrade = gradeOrder[book.grade] || 0;
      if (bGrade < pGrade) {
        for (const ch of book.chapters) {
          learnedChaps.add(ch.name);
          for (const sec of ch.sections) learnedSects.add(sec.name);
        }
      }
    }
  }
  
  let overall = `<div class="tbv-cr-header">📌 超纲检测 — ${esc(comparePrimary.label)} (主教材) ↔ ${compareTargets.length}本对比教材</div>`;
  
  for (const target of compareTargets) {
    let overCount = 0, matchCount = 0;
    let h = `<div class="tbv-cr-chapter" style="background:var(--hover-bg);font-size:11px;margin-top:4px">📘 ${esc(target.label)}</div>`;
    for (const ch of target.chapters) {
      const overSections = [];
      const matchedSections = [];
      for (const sec of ch.sections) {
        if (learnedSects.has(sec.name)) { matchedSections.push(sec); matchCount++; }
        else { overSections.push(sec); overCount++; }
      }
      if (overSections.length > 0) {
        h += `<div class="tbv-cr-chapter">📖 第${ch.num}章 ${esc(ch.name)} <span class="tbv-cr-tag over">${overSections.length}节超纲</span></div>`;
        for (const sec of overSections) {
          h += `<div class="tbv-cr-section"><span class="tbv-cr-tag over">超纲</span> ${esc(sec.num)} ${esc(sec.name)}</div>`;
        }
      } else {
        h += `<div class="tbv-cr-chapter">📖 第${ch.num}章 ${esc(ch.name)} <span class="tbv-cr-tag match">全部匹配</span></div>`;
        matchCount += ch.sections.length;
      }
    }
    if (overCount === 0) {
      h += `<div class="tbv-cr-empty" style="padding:10px">✅ 全部 ${matchCount} 节均已在主教材覆盖范围内</div>`;
    } else {
      h += `<div class="tbv-cr-section" style="padding:6px 14px;border-top:1px solid var(--border);font-size:11px;color:var(--text-muted)">共 ${overCount} 节超纲 · ${matchCount} 节已匹配</div>`;
    }
    overall += h;
  }
  results.innerHTML = overall;
}

function runLearnedCheck() {
  const results = document.getElementById('tbvLearnedResults');
  if (!learnedPrimary || learnedTargets.length === 0) return;
  
  // Collect all sections from all learned textbooks
  const learnedSects = new Set();
  const learnedChaps = new Set();
  for (const book of learnedTargets) {
    for (const ch of book.chapters) {
      learnedChaps.add(ch.name);
      for (const sec of ch.sections) learnedSects.add(sec.name);
    }
  }
  
  // Also include same-publisher lower grades
  const gradeOrder = {'六年级上册':1,'六年级下册':2,'七年级上册':3,'七年级下册':4,'八年级上册':5,'八年级下册':6,'九年级上册':7,'九年级下册':8};
  const pGrade = gradeOrder[learnedPrimary.grade] || 3;
  for (const book of TB) {
    if (book.publisher === learnedPrimary.publisher && book.id !== learnedPrimary.id) {
      const bGrade = gradeOrder[book.grade] || 0;
      if (bGrade < pGrade) {
        for (const ch of book.chapters) {
          learnedChaps.add(ch.name);
          for (const sec of ch.sections) learnedSects.add(sec.name);
        }
      }
    }
  }
  
  let learnedCount = 0, newCount = 0;
  let h = `<div class="tbv-cr-header">📖 ${esc(learnedPrimary.label)} — 已学检测 (${learnedTargets.length}本已学教材)</div>`;
  
  for (const ch of learnedPrimary.chapters) {
    const learnedSecs = [];
    const newSecs = [];
    for (const sec of ch.sections) {
      if (learnedSects.has(sec.name)) { learnedSecs.push(sec); learnedCount++; }
      else { newSecs.push(sec); newCount++; }
    }
    if (newSecs.length === 0 && learnedSecs.length > 0) {
      h += `<div class="tbv-cr-chapter">📖 第${ch.num}章 ${esc(ch.name)} <span class="tbv-cr-tag match">全部已学</span></div>`;
    } else if (newSecs.length > 0) {
      h += `<div class="tbv-cr-chapter">📖 第${ch.num}章 ${esc(ch.name)}</div>`;
      for (const sec of learnedSecs) {
        h += `<div class="tbv-cr-section"><span class="tbv-cr-tag match">已学</span> ${esc(sec.num)} ${esc(sec.name)}</div>`;
      }
      for (const sec of newSecs) {
        h += `<div class="tbv-cr-section"><span class="tbv-cr-tag over">未学</span> ${esc(sec.num)} ${esc(sec.name)}</div>`;
      }
    }
  }
  
  if (newCount === 0) {
    h = `<div class="tbv-cr-header">📖 ${esc(learnedPrimary.label)} — 已学检测</div>
      <div class="tbv-cr-empty" style="padding:20px;color:#16a34a">✅ 恭喜！全部 ${learnedCount} 节内容已学完！</div>`;
  } else {
    h += `<div class="tbv-cr-section" style="padding:8px 14px;border-top:1px solid var(--border);font-size:11px;color:var(--text-muted);background:var(--hover-bg)">
      ✅ 已学 ${learnedCount} 节 · 📌 未学 ${newCount} 节
    </div>`;
  }
  results.innerHTML = h;
}

// ===== MODULE TABS =====
function renderModuleTabs() {
  const el = document.getElementById('mt');

  for (const m of modules) {
    const mk = {'小学':'小学','初中':'初中','中考':'中考数学'}[m] || m;

function switchModule(m) {
  if (m==='全部' && !st.m) return;
  if (m==='全部') { goHome(); return; }
  st.m = {'小学':'小学','初中':'初中','中考':'中考数学'}[m];
  st.c1=''; st.c2=''; st.ar='';
  document.getElementById('extraPanels').innerHTML = '';
  renderModuleTabs();
  renderSidebar();
  renderResults();
}

// ===== SIDEBAR =====
function renderSidebar() {
  const sd = document.getElementById('sd');
  if (!st.m) { sd.innerHTML=''; sd.classList.remove('sh'); return; }
  sd.classList.add('sh');
  const cats = T[st.m] || {};
  const c1s = Object.keys(cats).sort((a,b) => (S[st.m]?.cs?.[b]||0) - (S[st.m]?.cs?.[a]||0));
  let h = '<div class="sl"><div class="shd">📂 分类筛选</div>';
  if (st.c1 && cats[st.c1]) {
    h += `<div class="sbk" onclick="selectC1()">← ${esc(st.c1)}</div>`;
    const c2s = cats[st.c1];
    const ns = Object.keys(c2s).sort((a,b) => (c2s[b]||0)-(c2s[a]||0));
    for (const c2 of ns) {
      if (!c2) continue;
      const a = st.c2===c2?'on':'';
      h += `<div class="si ${a}" onclick="selectC2('${escQ(st.c1)}','${escQ(c2)}')"><span class="nm">${esc(c2)}</span><span class="cn">${c2s[c2]}</span></div>`;
    }
  } else {
    for (const c1 of c1s) {
      const c2s = cats[c1];
      let tot = 0;
      for (const k in c2s) tot += c2s[k];
      const a = st.c1===c1?'on':'';
      h += `<div class="si ${a}" onclick="selectC1('${escQ(c1)}')"><span class="ar">▶</span><span class="nm">${esc(c1)}</span><span class="cn">${tot}</span></div>`;
    }
  }
  h += '</div>';
  sd.innerHTML = h;
}

function selectC1(c1) {
  if (c1) { st.c1=c1; st.c2=''; } else { st.c1=''; st.c2=''; }
  renderSidebar(); renderResults();
}
function selectC2(c1,c2) {
  st.c2 = st.c2===c2 ? '' : c2;
  renderSidebar(); renderResults();
}

// ===== AREA FILTER (for 中考) =====
function renderAreaFilter(fil) {
  const el = document.getElementById('ac');
  if (st.m !== '中考数学') { el.innerHTML=''; return; }
  const am = {};
  fil.forEach(e => (e.areas||[]).forEach(a => { if(a) am[a]=(am[a]||0)+1; }));
  const ss = Object.entries(am).sort((a,b)=>b[1]-a[1]);
  if (!ss.length) { el.innerHTML=''; return; }
  let h = '<span style="font-size:12px;color:var(--text-muted);font-weight:600;margin-right:4px">📍 地区</span>';
  for (const [area, cnt] of ss) {
    const col = C[area]||'#64748b';
    const on = st.ar===area?'on':'';
    h += `<span class="act ${on}" style="background:${col}22;color:${col};border-color:${col}44" onclick="setArea('${escQ(area)}')">${esc(area)} <span style="opacity:.6;font-size:11px">${cnt}</span></span>`;
  }
  el.innerHTML = h;
}
function setArea(a) { st.ar = st.ar===a ? '' : a; renderResults(); }

// ===== BREADCRUMB =====
function renderBreadcrumb() {
  const el = document.getElementById('cb');
  if (st.m === '中考数学') { el.innerHTML=''; return; }
  let parts = [];
  if (st.m) parts.push(st.m);
  if (st.c1) {
    parts.push(`<span class="c" onclick="selectC1()">${esc(st.c1)}</span>`);
    const c2s = (T[st.m]||{})[st.c1]||{};
    const ns = Object.keys(c2s).sort((a,b)=>(c2s[b]||0)-(c2s[a]||0));
    for (const c2 of ns) {
      if (!c2) continue;
      const a = st.c2===c2 ? ' style="color:var(--accent);font-weight:600"' : '';
      parts.push(`<span class="c"${a} onclick="selectC2('${escQ(st.c1)}','${escQ(c2)}')">${esc(c2)}</span>`);
    }
  }
  el.innerHTML = parts.join(' <span style="color:var(--text-muted)">›</span> ');
}

// ===== RESULTS =====
function renderResults() {
  // Filter
  let fil = [];
  for (const e of D) {
    if (st.m && e.m !== st.m) continue;
    if (st.c1 && e.c1 !== st.c1) continue;
    if (st.c2 && e.c2 !== st.c2) continue;
    if (st.tp !== 'all' && e.tp !== st.tp) continue;
    if (st.ar && (!e.areas || e.areas.indexOf(st.ar) < 0)) continue;
    if (st.q) {
      const q = st.q.toLowerCase();
      if (e.t.toLowerCase().indexOf(q)<0 && e.d.toLowerCase().indexOf(q)<0 &&
          e.c1.toLowerCase().indexOf(q)<0 && (e.c2||'').toLowerCase().indexOf(q)<0 &&
          (e.c3||'').toLowerCase().indexOf(q)<0 && (e.x||'').toLowerCase().indexOf(q)<0) continue;
    }
    fil.push(e);
  }

  // Info
  const pts = ['共 <strong>'+fil.length+'</strong> 条知识'];
  if (st.q) pts.push('搜索: "'+esc(st.q)+'"');
  if (st.m && st.m!=='中考数学') pts.push(st.m);
  if (st.c1 && st.m!=='中考数学') pts.push(st.c1+(st.c2?' → '+st.c2:''));
  document.getElementById('st').innerHTML = pts.join(' · ');

  renderAreaFilter(fil);
  renderBreadcrumb();
  renderTypeFilter();

  // Close extra panels
  document.getElementById('extraPanels').innerHTML = '';

  // Empty state
  if (fil.length === 0) {
    document.getElementById('rs').innerHTML = '<div class="em"><div class="e">🔍</div><h3>没有找到匹配的知识</h3></div>';
    return;
  }

  // Render cards
  const page = 100;
  let h = '';
  const max = Math.min(page, fil.length);
  for (let i=0; i<max; i++) {
    const e = fil[i];
    const tc = e.tp==='basic'?'t1':(e.tp==='extend'?'t2':'t3');
    const lastSubCat = e.c2 || e.c1;
    const desc = e.d ? highlight(esc(e.d), st.q) : '';
    let extra = '';
    if (e.x) extra = '<strong>备注：</strong>'+highlight(esc(e.x), st.q);
    let ah = '';
    if (e.areas && e.areas.length) {
      ah = '<div class="as">'+e.areas.map(a => {
        const col = C[a]||'#64748b';
        return '<span class="at" style="background:'+col+'">'+esc(a)+'</span>';
      }).join('')+'</div>';
    }
    const modBadge = '<span class="mt '+{'小学':'a','初中':'b','中考数学':'c'}[e.m]+'">'+(ND[e.m]||e.m)+'</span>';
    const typeLabel = {basic:'基础',extend:'拓展',exam:'高频考点'}[e.tp];
    const isZK = e.m === '中考数学';
    const typeClass = isZK?'pk':{basic:'t1',extend:'t2',exam:'t3'}[e.tp];
    const headerHtml = modBadge+'<div class="r1c"><span class="ttl '+typeClass+'">'+typeLabel+'</span><span class="scat">'+esc(lastSubCat)+'</span></div>';

    // Favorites + progress buttons
    const favBtn = isFav(e) 
      ? '<span class="action-btn active" onclick="toggleFav('+i+',event)">⭐ 已收藏</span>'
      : '<span class="action-btn" onclick="toggleFav('+i+',event)">☆ 收藏</span>';
    const learnBtn = isLearned(e)
      ? '<span class="action-btn learned" onclick="toggleLearned('+i+',event)">✅ 已掌握</span>'
      : '<span class="action-btn" onclick="toggleLearned('+i+',event)">📖 标记</span>';

    h += `<div class="ey ${tc}" data-idx="${i}">
      ${headerHtml}
      <h3>${highlight(esc(e.t), st.q)}</h3>
      ${desc ? '<div class="de">'+desc+'</div>' : ''}
      ${e.imt ? '<img class="im" src="data:image/png;base64,'+e.imt+'" onclick="showImg(\''+e.img+'\')" title="点击查看大图">' : (e.img && e.img.startsWith('image') ? '<img class="im" src="images/'+e.img+'" onclick="showImgFile(this.src)" title="点击查看大图">' : '')}
      ${extra ? '<div class="ex">'+extra+'</div>' : ''}
      ${ah}
      <div class="actions">${favBtn}${learnBtn}</div>
    </div>`;
  }

  if (fil.length > page) {
    h += '<div style="text-align:center;padding:20px;color:var(--text-muted);font-size:13px">显示前 '+page+' 条，共 '+fil.length+' 条（输入更精确的关键词缩小范围）</div>';
  }
  document.getElementById('rs').innerHTML = h;
}

// ===== FAVORITES =====
function isFav(e) {
  const favs = JSON.parse(localStorage.getItem(STORE_KEY+'_favs') || '[]');
  return favs.some(f => f.t === e.t && f.m === e.m);
}
function toggleFav(idx, event) {
  if (event) event.stopPropagation();
  const e = filterCurrentResults()[idx];
  if (!e) return;
  let favs = JSON.parse(localStorage.getItem(STORE_KEY+'_favs') || '[]');
  const existing = favs.findIndex(f => f.t === e.t && f.m === e.m);
  if (existing >= 0) {
    favs.splice(existing, 1);
  } else {
    favs.push({t: e.t, m: e.m, d: e.d ? e.d.slice(0,60) : '', c1: e.c1, savedAt: Date.now()});
  }
  localStorage.setItem(STORE_KEY+'_favs', JSON.stringify(favs));
  renderResults();
}
function showFavorites() {
  const panel = document.getElementById('extraPanels');
  const favs = JSON.parse(localStorage.getItem(STORE_KEY+'_favs') || '[]');
  if (!favs.length) {
    panel.innerHTML = '<div class="fav-panel"><h4>⭐ 收藏夹</h4><div class="fav-empty">还没有收藏的知识点</div></div>';
    return;
  }
  let h = '<div class="fav-panel"><h4>⭐ 收藏夹 <span style="font-weight:400;font-size:12px;color:var(--text-muted)">('+favs.length+')</span></h4><div class="fav-list">';
  for (const f of favs) {
    h += `<span class="fav-tag" onclick="searchFav('${escQ(f.t)}')">${esc(f.t)}</span>`;
  }
  h += '</div></div>';
  panel.innerHTML = h;
}

function searchFav(title) {
  st.q = title;
  document.getElementById('sq').value = title;
  if (!st.m) {
    st.m = '小学';
    document.getElementById('hm').style.display='none';
    document.getElementById('qs').style.display='none';
    document.getElementById('br').classList.add('sh');
    renderModuleTabs();
    renderSidebar();
  }
  renderResults();
}

// ===== LEARNING PROGRESS =====
function isLearned(e) {
  const learned = JSON.parse(localStorage.getItem(STORE_KEY+'_learned') || '[]');
  return learned.some(f => f.t === e.t && f.m === e.m);
}
function toggleLearned(idx, event) {
  if (event) event.stopPropagation();
  const e = filterCurrentResults()[idx];
  if (!e) return;
  let learned = JSON.parse(localStorage.getItem(STORE_KEY+'_learned') || '[]');
  const existing = learned.findIndex(f => f.t === e.t && f.m === e.m);
  if (existing >= 0) {
    learned.splice(existing, 1);
  } else {
    learned.push({t: e.t, m: e.m, learnedAt: Date.now()});
  }
  localStorage.setItem(STORE_KEY+'_learned', JSON.stringify(learned));
  renderResults();
}
function showLearningProgress() {
  const panel = document.getElementById('extraPanels');
  const learned = JSON.parse(localStorage.getItem(STORE_KEY+'_learned') || '[]');
  const total = D.length;
  const done = learned.length;

  let stats = {};
  for (const l of learned) {
    stats[l.m] = (stats[l.m]||0) + 1;
  }

      <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,#22c55e,#4ade80);border-radius:4px;transition:width .5s"></div>

// ===== KNOWLEDGE GRAPH =====
function showGraph() {
  const panel = document.getElementById('extraPanels');
  let h = `<div class="graph-panel">
    <h4>📊 知识图谱 — 知识点关联图</h4>
    <canvas id="graphCanvas" class="graph-canvas"></canvas>
    <div style="margin-top:8px;font-size:12px;color:var(--text-muted);text-align:center">
      知识点按模块分类，连线表示同属一个分类
    </div>
  </div>`;
  panel.innerHTML = h;

  setTimeout(() => renderGraph(), 100);
}

function renderGraph() {
  const canvas = document.getElementById('graphCanvas');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  const rect = canvas.parentElement.getBoundingClientRect();
  canvas.width = canvas.parentElement.clientWidth || 800;
  canvas.height = 400;

  // Build graph: modules as center nodes, categories as surrounding nodes
  const modules = ['小学','初中','中考数学'];
  const colors = ['#f97316','#22c55e','#a855f7'];
  const centerX = canvas.width / 2;
  const centerY = 200;
  
  // Module positions (bottom row)
  const mPos = {};
  const mCount = modules.length;
  modules.forEach((m,i) => {
    mPos[m] = {
      x: centerX + (i-1) * 200,
      y: 340
    };
  });

  // Get top categories
  const allCats = [];
  const used = new Set();
  for (const m of modules) {
    const c1s = Object.keys(T[m]||{});
    for (const c1 of c1s) {
      if (!used.has(c1)) {
        allCats.push({name: c1, module: m, count: S[m]?.cs?.[c1] || 0});
        used.add(c1);
      }
    }
  }
  // Pick top categories by count
  allCats.sort((a,b) => b.count - a.count);
  const topCats = allCats.slice(0, 24);

  // Category positions (radial around top)
  const angleStep = (Math.PI * 2) / topCats.length;
  const radius = Math.min(canvas.width, canvas.height) * 0.32;

  // Draw edges first
  ctx.strokeStyle = 'rgba(99,102,241,0.08)';
  ctx.lineWidth = 1;
  for (let i=0; i<topCats.length; i++) {
    const cat = topCats[i];
    const angle = angleStep * i - Math.PI/2;
    const cx = centerX + Math.cos(angle) * radius;
    const cy = centerY + Math.sin(angle) * radius - 40;
    
    // Connect to its module
    const mp = mPos[cat.module];
    if (mp) {
      ctx.beginPath();
      ctx.moveTo(cx, cy);
      ctx.lineTo(mp.x, mp.y);
      ctx.stroke();
    }
  }

  // Draw category nodes
  for (let i=0; i<topCats.length; i++) {
    const cat = topCats[i];
    const angle = angleStep * i - Math.PI/2;
    const cx = centerX + Math.cos(angle) * radius;
    const cy = centerY + Math.sin(angle) * radius - 40;
    
    const size = Math.max(8, Math.min(20, cat.count / 8));
    const mIdx = modules.indexOf(cat.module);
    const col = colors[mIdx] || '#6366f1';
    
    ctx.beginPath();
    ctx.arc(cx, cy, size, 0, Math.PI*2);
    ctx.fillStyle = col + '33';
    ctx.fill();
    ctx.strokeStyle = col;
    ctx.lineWidth = 2;
    ctx.stroke();

    // Label
    ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text').trim() || '#1e293b';
    ctx.font = '11px sans-serif';
    ctx.textAlign = 'center';
    ctx.fillText(cat.name.length > 6 ? cat.name.slice(0,5)+'..' : cat.name, cx, cy + size + 14);
  }

  // Draw module nodes (bottom)
  for (const m of modules) {
    const p = mPos[m];
    const mIdx = modules.indexOf(m);
    const col = colors[mIdx];
    ctx.beginPath();
    ctx.arc(p.x, p.y, 28, 0, Math.PI*2);
    ctx.fillStyle = col;
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 3;
    ctx.stroke();

    ctx.fillStyle = '#fff';
    ctx.font = 'bold 12px sans-serif';
    ctx.textAlign = 'center';
    const label = {'小学':'小学','初中':'初中','中考数学':'中考'}[m];
    ctx.fillText(label, p.x, p.y + 4);
  }

  // Center label
  ctx.fillStyle = getComputedStyle(document.documentElement).getPropertyValue('--text-muted').trim() || '#94a3b8';
  ctx.font = '13px sans-serif';
  ctx.textAlign = 'center';
  ctx.fillText('知识点关联图 · ' + D.length + ' 条知识', centerX, 20);
}

// ===== UTILITY =====
function filterCurrentResults() {
  const fil = [];
  for (const e of D) {
    if (st.m && e.m !== st.m) continue;
    if (st.c1 && e.c1 !== st.c1) continue;
    if (st.c2 && e.c2 !== st.c2) continue;
    if (st.tp !== 'all' && e.tp !== st.tp) continue;
    if (st.ar && (!e.areas || e.areas.indexOf(st.ar) < 0)) continue;
    if (st.q) {
      const q = st.q.toLowerCase();
      if (e.t.toLowerCase().indexOf(q)<0 && e.d.toLowerCase().indexOf(q)<0 &&
          e.c1.toLowerCase().indexOf(q)<0 && (e.c2||'').toLowerCase().indexOf(q)<0 &&
          (e.c3||'').toLowerCase().indexOf(q)<0) continue;
    }
    fil.push(e);
  }
  return fil;
}

// ===== AUTH =====
const AUTH_PWD = 'math2024';
const AUTH_KEY = STORE_KEY + '_auth_expire';

function isAuthed() {
  const expire = localStorage.getItem(AUTH_KEY);
  return expire && Date.now() < parseInt(expire);
}
function checkAuth() {
  const pwd = document.getElementById('authPwd').value;
  document.getElementById('authErr').style.display = 'none';
  if (pwd === AUTH_PWD) {
    const expire = Date.now() + 30 * 24 * 60 * 60 * 1000;
    localStorage.setItem(AUTH_KEY, expire.toString());
    document.getElementById('authOverlay').style.display = 'none';
    renderResults();
  } else {
    document.getElementById('authErr').style.display = 'block';
  }
}
function requireAuth() {
  if (isAuthed()) return true;
  document.getElementById('authOverlay').style.display = 'flex';
  document.getElementById('authPwd').value = '';
  document.getElementById('authErr').style.display = 'none';
  return false;
}

// ===== HELPERS =====
function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escQ(s) {
  return (s||'').replace(/'/g,"\\'");
}
function highlight(s, q) {
  if (!q || !s) return s;
  try {
    const r = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    return s.replace(new RegExp('('+r+')','gi'), '<mark>$1</mark>');
  } catch(e) { return s; }
}
