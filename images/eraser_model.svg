<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 320" font-family="Arial, sans-serif">
  <rect width="600" height="320" fill="#ffffff" rx="8"/>
  
  <!-- Title -->
  <text x="300" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#1f2937">平行线模型 — 橡皮擦型</text>
  
  <!-- Two parallel lines -->
  <line x1="50" y1="220" x2="530" y2="220" stroke="#2563eb" stroke-width="2.5"/>
  <line x1="50" y1="80" x2="530" y2="80" stroke="#2563eb" stroke-width="2.5"/>
  
  <!-- Arrow markers on parallel lines -->
  <polygon points="220,75 230,80 220,85" fill="#2563eb"/>
  <polygon points="370,75 380,80 370,85" fill="#2563eb"/>
  <polygon points="220,215 230,220 220,225" fill="#2563eb"/>
  <polygon points="370,215 380,220 370,225" fill="#2563eb"/>
  
  <!-- Line labels -->
  <text x="545" y="84" font-size="12" font-weight="bold" fill="#2563eb">l₁</text>
  <text x="545" y="224" font-size="12" font-weight="bold" fill="#2563eb">l₂</text>
  
  <!-- Zigzag eraser path -->
  <!-- Points: (75,220), (165,80), (255,220), (345,80), (435,220), (515,80) -->
  <polyline points="75,220 165,80 255,220 345,80 435,220 515,80" 
            fill="none" stroke="#374151" stroke-width="2" stroke-linejoin="round"/>
  
  <!-- Vertex circles -->
  <circle cx="75" cy="220" r="4" fill="white" stroke="#374151" stroke-width="1.5"/>
  <circle cx="165" cy="80" r="4" fill="white" stroke="#374151" stroke-width="1.5"/>
  <circle cx="255" cy="220" r="4" fill="white" stroke="#374151" stroke-width="1.5"/>
  <circle cx="345" cy="80" r="4" fill="white" stroke="#374151" stroke-width="1.5"/>
  <circle cx="435" cy="220" r="4" fill="white" stroke="#374151" stroke-width="1.5"/>
  <circle cx="515" cy="80" r="4" fill="white" stroke="#374151" stroke-width="1.5"/>
  
  <!-- Angle arcs -->
  <!-- At (165,80): between upward segment and downward segment -->
  <path d="M 175,80 A 10,10 0 0,1 160,70" fill="none" stroke="#dc2626" stroke-width="1.5"/>
  <text x="188" y="68" font-size="11" font-weight="bold" fill="#dc2626">∠1</text>
  
  <!-- At (255,220): between downward and upward -->
  <path d="M 245,220 A 10,10 0 0,1 260,230" fill="none" stroke="#dc2626" stroke-width="1.5"/>
  <text x="248" y="248" font-size="11" font-weight="bold" fill="#dc2626">∠2</text>
  
  <!-- At (345,80) -->
  <path d="M 355,80 A 10,10 0 0,1 340,70" fill="none" stroke="#dc2626" stroke-width="1.5"/>
  <text x="358" y="68" font-size="11" font-weight="bold" fill="#dc2626">∠3</text>
  
  <!-- At (435,220) -->
  <path d="M 425,220 A 10,10 0 0,1 440,230" fill="none" stroke="#dc2626" stroke-width="1.5"/>
  <text x="428" y="248" font-size="11" font-weight="bold" fill="#dc2626">∠4</text>
  
  <!-- At (515,80) -->
  <path d="M 505,80 A 10,10 0 0,1 520,90" fill="none" stroke="#dc2626" stroke-width="1.5"/>
  <text x="515" y="102" font-size="11" font-weight="bold" fill="#dc2626">∠5</text>
  
  <!-- Formula box -->
  <rect x="120" y="260" width="360" height="32" rx="6" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.2"/>
  <text x="300" y="280" text-anchor="middle" font-size="11" font-weight="bold" fill="#1f2937">∠1+∠2+∠3+∠4+∠5 = (5-1)×180° = 720°</text>
  
  <!-- Conclusion -->
  <text x="300" y="305" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">结论：n个角之和 = (n-1)×180°</text>
</svg>
