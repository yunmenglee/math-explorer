<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" font-family="Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="10" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2563eb"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" rx="8" fill="#ffffff"/>

  <!-- Title -->
  <text x="300" y="32" text-anchor="middle" font-size="16" font-weight="bold" fill="#1f2937">平行线模型——橡皮擦型</text>

  <!-- Two parallel lines -->
  <line x1="60" y1="100" x2="540" y2="100" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>
  <line x1="60" y1="300" x2="540" y2="300" stroke="#2563eb" stroke-width="2.5" marker-end="url(#arrow)"/>

  <!-- Labels l1, l2 -->
  <text x="555" y="104" font-size="13" font-style="italic" fill="#2563eb" font-weight="bold">l₁</text>
  <text x="555" y="304" font-size="13" font-style="italic" fill="#2563eb" font-weight="bold">l₂</text>

  <!-- Zigzag path forming angles -->
  <!-- Segment 1: from top line to first vertex -->
  <line x1="120" y1="100" x2="180" y2="200" stroke="#374151" stroke-width="2"/>
  <!-- Segment 2: first vertex to second vertex -->
  <line x1="180" y1="200" x2="260" y2="140" stroke="#374151" stroke-width="2"/>
  <!-- Segment 3: second vertex to third vertex -->
  <line x1="260" y1="140" x2="340" y2="260" stroke="#374151" stroke-width="2"/>
  <!-- Segment 4: third vertex to bottom line -->
  <line x1="340" y1="260" x2="420" y2="300" stroke="#374151" stroke-width="2"/>

  <!-- Vertex points on the zigzag -->
  <circle cx="120" cy="100" r="3" fill="#374151"/>
  <circle cx="180" cy="200" r="3" fill="#374151"/>
  <circle cx="260" cy="140" r="3" fill="#374151"/>
  <circle cx="340" cy="260" r="3" fill="#374151"/>
  <circle cx="420" cy="300" r="3" fill="#374151"/>

  <!-- Angle arc 1: at vertex between segment 1 and extension of top line -->
  <path d="M 136 143 A 16 16 0 0 1 128 108" fill="none" stroke="#dc2626" stroke-width="1.5"/>
  <text x="148" y="138" font-size="12" font-weight="bold" fill="#dc2626">∠1</text>

  <!-- Angle arc 2: at vertex between segment 1,2 -->
  <path d="M 180 183 A 16 16 0 0 1 196 194" fill="none" stroke="#dc2626" stroke-width="1.5"/>
  <text x="208" y="196" font-size="12" font-weight="bold" fill="#dc2626">∠2</text>

  <!-- Angle arc 3: at vertex between segment 2,3 -->
  <path d="M 266 157 A 16 16 0 0 0 254 143" fill="none" stroke="#dc2626" stroke-width="1.5"/>
  <text x="272" y="148" font-size="12" font-weight="bold" fill="#dc2626">∠3</text>

  <!-- Angle arc 4: at vertex between segment 3,4 -->
  <path d="M 334 243 A 16 16 0 0 1 348 252" fill="none" stroke="#dc2626" stroke-width="1.5"/>
  <text x="360" y="248" font-size="12" font-weight="bold" fill="#dc2626">∠4</text>

  <!-- Formula box -->
  <rect x="130" y="340" width="340" height="38" rx="6" fill="#fee2e2" stroke="#fca5a5" stroke-width="1.5"/>
  <text x="300" y="365" text-anchor="middle" font-size="13" font-weight="bold" fill="#1f2937">∠1＋∠2＋∠3＋…＋∠n ＝ (n－1) × 180°</text>

  <!-- Conclusion -->
  <text x="300" y="390" text-anchor="middle" font-size="11" font-style="italic" fill="#64748b">两平行线间 n 个角之和等于（n−1）× 180°</text>
</svg>