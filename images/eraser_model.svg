<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 280" font-family="SimSun, serif">
  <rect width="500" height="280" fill="#ffffff" rx="6"/>
  
  <!-- Title -->
  <text x="250" y="28" text-anchor="middle" font-size="15" font-weight="bold" fill="#1f2937">平行线模型 — 橡皮擦型</text>
  
  <!-- Two parallel lines with arrows -->
  <line x1="40" y1="190" x2="460" y2="190" stroke="#2563eb" stroke-width="2.5"/>
  <line x1="40" y1="70" x2="460" y2="70" stroke="#2563eb" stroke-width="2.5"/>
  
  <!-- Direction arrows on lines -->
  <polygon points="200,65 210,70 200,75" fill="#2563eb"/>
  <polygon points="350,65 360,70 350,75" fill="#2563eb"/>
  <polygon points="200,185 210,190 200,195" fill="#2563eb"/>
  <polygon points="350,185 360,190 350,195" fill="#2563eb"/>
  
  <text x="470" y="74" font-size="12" font-weight="bold" fill="#2563eb">l₁</text>
  <text x="470" y="194" font-size="12" font-weight="bold" fill="#2563eb">l₂</text>
  
  <!-- Eraser zigzag: l₂ → l₁ → l₂ → l₁ → l₂ → l₁ -->
  <polyline points="50,190 110,70 170,190 230,70 290,190 350,70 410,190 440,70"
            fill="none" stroke="#374151" stroke-width="2" stroke-linejoin="round"/>
  
  <!-- Vertex dots -->
  <circle cx="50" cy="190" r="3.5" fill="#374151"/>
  <circle cx="110" cy="70" r="3.5" fill="#374151"/>
  <circle cx="170" cy="190" r="3.5" fill="#374151"/>
  <circle cx="230" cy="70" r="3.5" fill="#374151"/>
  <circle cx="290" cy="190" r="3.5" fill="#374151"/>
  <circle cx="350" cy="70" r="3.5" fill="#374151"/>
  <circle cx="410" cy="190" r="3.5" fill="#374151"/>
  <circle cx="440" cy="70" r="3.5" fill="#374151"/>

  <!-- Blue connection segments (parallel line between vertices) -->
  <line x1="110" y1="70" x2="170" y2="70" stroke="#2563eb" stroke-width="2.5"/>
  <line x1="230" y1="70" x2="290" y2="70" stroke="#2563eb" stroke-width="2.5"/>
  <line x1="350" y1="70" x2="410" y2="70" stroke="#2563eb" stroke-width="2.5"/>
  <line x1="50" y1="190" x2="110" y2="190" stroke="#2563eb" stroke-width="2.5"/>
  <line x1="170" y1="190" x2="230" y2="190" stroke="#2563eb" stroke-width="2.5"/>
  <line x1="290" y1="190" x2="350" y2="190" stroke="#2563eb" stroke-width="2.5"/>
  <line x1="410" y1="190" x2="460" y2="190" stroke="#2563eb" stroke-width="2.5"/>
  
  <!-- Angle arcs (7 angles) -->
  <path d="M 115,70 A 8,8 0 0,0 108,78" fill="none" stroke="#dc2626" stroke-width="1.5"/>
  <text x="118" y="62" font-size="10" font-weight="bold" fill="#dc2626">∠1</text>
  
  <path d="M 168,182 A 8,8 0 0,0 162,190" fill="none" stroke="#dc2626" stroke-width="1.5"/>
  <text x="175" y="208" font-size="10" font-weight="bold" fill="#dc2626">∠2</text>
  
  <path d="M 235,70 A 8,8 0 0,0 228,78" fill="none" stroke="#dc2626" stroke-width="1.5"/>
  <text x="238" y="62" font-size="10" font-weight="bold" fill="#dc2626">∠3</text>
  
  <path d="M 288,182 A 8,8 0 0,0 282,190" fill="none" stroke="#dc2626" stroke-width="1.5"/>
  <text x="295" y="208" font-size="10" font-weight="bold" fill="#dc2626">∠4</text>
  
  <path d="M 355,70 A 8,8 0 0,0 348,78" fill="none" stroke="#dc2626" stroke-width="1.5"/>
  <text x="358" y="62" font-size="10" font-weight="bold" fill="#dc2626">∠5</text>
  
  <path d="M 408,182 A 8,8 0 0,0 402,190" fill="none" stroke="#dc2626" stroke-width="1.5"/>
  <text x="415" y="208" font-size="10" font-weight="bold" fill="#dc2626">∠6</text>
  
  <path d="M 443,70 A 8,8 0 0,0 437,77" fill="none" stroke="#dc2626" stroke-width="1.5"/>
  <text x="448" y="62" font-size="10" font-weight="bold" fill="#dc2626">∠7</text>

  <!-- Formula -->
  <rect x="80" y="230" width="340" height="28" rx="5" fill="#fee2e2" stroke="#fca5a5" stroke-width="1"/>
  <text x="250" y="249" text-anchor="middle" font-size="11" font-weight="bold" fill="#1f2937">∠1+∠2+∠3+∠4+∠5+∠6+∠7 = (7-1)×180° = 1080°</text>
  
  <text x="250" y="272" text-anchor="middle" font-size="10" fill="#64748b" font-style="italic">结论：n个角之和 = (n-1)×180°</text>
</svg>
